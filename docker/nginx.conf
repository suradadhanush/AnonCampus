# ─────────────────────────────────────────────────────────────────────────────
#  AnonCampus — Nginx Configuration
#
#  HTTP (port 80): redirects all traffic to HTTPS in production.
#  HTTPS (port 443): SSL termination, proxy to FastAPI backend.
#
#  For local development (no SSL): only the HTTP server block is active.
#  For production: uncomment the HTTPS block and run certbot.
# ─────────────────────────────────────────────────────────────────────────────

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Upstream backend ──────────────────────────────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # auth: strict — 10 req/min per IP (login, register)
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    # api: general — 60 req/min per IP
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

    # ── Security headers (applied globally) ───────────────────────────────────
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header X-XSS-Protection          "1; mode=block"                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTP Server — Port 80
    #  In production: redirect everything to HTTPS.
    #  In development: proxy directly (SSL not required).
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health/readiness — no rate limit, no redirect
        # Required for Docker HEALTHCHECK and load-balancer probes
        location ~ ^/(health|ready)$ {
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            access_log         off;
        }

        # ── PRODUCTION: uncomment this block to force HTTPS ──────────────────
        # return 301 https://$host$request_uri;
        # ─────────────────────────────────────────────────────────────────────

        # ── DEVELOPMENT: proxy all requests directly ──────────────────────────
        location /api/auth/ {
            limit_req zone=auth_zone burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        location / {
            return 404 '{"error":"not_found"}';
            add_header Content-Type application/json;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    #  HTTPS Server — Port 443 (PRODUCTION ONLY)
    #
    #  To activate:
    #  1. Uncomment this entire server block
    #  2. Replace yourdomain.com with your actual domain
    #  3. Run: certbot --nginx -d yourdomain.com
    #  4. Comment out the development proxy in the HTTP block above
    #     and uncomment the HTTPS redirect (return 301 ...) instead
    # ─────────────────────────────────────────────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     # SSL certificates (managed by certbot)
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     # SSL hardening
    #     ssl_protocols             TLSv1.2 TLSv1.3;
    #     ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_timeout       1d;
    #     ssl_session_cache         shared:SSL:10m;
    #     ssl_session_tickets       off;
